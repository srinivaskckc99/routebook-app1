name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Find project folder and build
      run: |
        # Automatically find where package.json is hidden
        TARGET_DIR=$(dirname $(find . -name package.json -not -path "*/node_modules/*" | head -n 1))
        echo "Found project directory at: $TARGET_DIR"
        cd "$TARGET_DIR"
        
        npm install
        npm run build
        npx cap sync
        
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug
        
        # Move the compiled APK to the root so the upload step can find it
        mkdir -p $GITHUB_WORKSPACE/output
        cp app/build/outputs/apk/debug/app-debug.apk $GITHUB_WORKSPACE/output/RouteBook.apk

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: RouteBook-APK
        path: output/RouteBook.apk
